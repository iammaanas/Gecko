<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Applications — Gecko Lab</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .size-visual{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem}
    .size-box {
      width:96px;height:128px;
      background:linear-gradient(135deg,rgba(0,240,160,.18),rgba(0,240,160,.05));
      border:2px solid var(--border-2);border-radius:var(--r1);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.3rem;position:relative;
    }
    .size-box::before{content:'3 in';position:absolute;top:-1.4rem;font-family:var(--fm);font-size:.7rem;color:var(--teal)}
    .size-box::after{content:'4 in';position:absolute;right:-2.2rem;top:50%;transform:translateY(-50%);font-family:var(--fm);font-size:.7rem;color:var(--teal)}
    .size-box span{font-family:var(--fm);font-size:.7rem;color:var(--t3);text-align:center}
    .size-num{font-family:var(--fm);font-size:1.5rem;font-weight:700;color:var(--teal)}
  </style>
</head>
<body>
<script src="js/layout.js"></script>
<script>
document.getElementById("page-content").innerHTML = `
<div class="page-hero">
  <div class="ph-top">
    <span class="tag tag-teal">04 / Engineering</span>
    <span class="tag tag-blue">Robotics · Medicine · Space</span>
  </div>
  <h1>Real-World <em>Applications</em></h1>
  <p style="max-width:600px">
    From a Stanford climbing robot in 2005 to NASA's ISS deployment in 2019 — gecko adhesion
    has jumped from lab curiosity to mission-critical technology across four industries.
  </p>
</div>

<div class="section-rule"><span>Featured — Geckskin</span></div>

<div class="highlight-card reveal">
  <div>
    <h2>Geckskin™</h2>
    <p style="font-family:var(--fm);font-size:.7rem;color:var(--t3);margin-bottom:.8rem;letter-spacing:.08em">UMASS AMHERST — CROSBY & IRSCHICK, 2012</p>
    <p style="margin-bottom:1rem">
      A synthetic adhesive that replicates gecko tendon geometry — stiff woven fabric embedded in soft elastomer.
      Unlike smooth silicon setae patches, Geckskin locks stress across the entire contact area rather than concentrating it at edges.
    </p>
    <p style="margin-bottom:1.2rem">
      Result: a 3×4 inch patch holds <strong style="color:var(--teal)">136 kg</strong> on glass, then peels clean with zero residue.
      Attaches and detaches thousands of times.
    </p>
    <div style="display:flex;gap:.6rem;flex-wrap:wrap">
      <a class="btn" href="https://www.umass.edu/newsoffice/article/geckskin-sticks-hauls-700-pounds-glass" target="_blank">↗ UMass News</a>
      <a class="btn btn-ghost" href="https://www.nature.com/articles/nmat3468" target="_blank">↗ Nature Materials</a>
    </div>
  </div>
  <div class="size-visual">
    <div class="size-box">
      <span class="size-num">136 kg</span>
      <span>on glass<br>no residue</span>
    </div>
    <span style="font-family:var(--fm);font-size:.65rem;color:var(--t4)">3 × 4 inch patch</span>
  </div>
</div>

<div class="section-rule reveal"><span>All Applications</span></div>

<div class="app-grid">

  <div class="card reveal">
    <span class="tag tag-amber">Gecko Tape</span>
    <h2 style="margin-top:.8rem">Synthetic Gecko Tape</h2>
    <p style="flex:1">
      Micro-structured adhesive film inspired by gecko setae arrays. Uses angled polymer pillars
      to generate directional van der Waals adhesion — strong when pulled parallel, releases easily when peeled.
      Tested at 136 kg per palm-size patch with zero residue after removal.
    </p>
    <div class="app-detail">
      <strong>Key metric:</strong> 136 kg/~134 cm² — 27× stronger than 3M per unit area<br>
      <strong>Reusability:</strong> 1,000+ cycles with &lt;5% degradation
    </div>
    <div class="app-links">
      <a class="btn btn-ghost" href="https://www.nature.com/articles/35079073" target="_blank" style="font-size:.68rem">↗ Nature 2000</a>
    </div>
  </div>

  <div class="card reveal reveal-delay-1">
    <span class="tag tag-blue">Robotics</span>
    <h2 style="margin-top:.8rem">Stickybot & Climbing Robots</h2>
    <p style="flex:1">
      Stanford's Stickybot (2005) was the first robot to climb smooth vertical surfaces using
      directional synthetic setae. Inspired wall-climbing inspection robots now used in skyscraper
      maintenance, bridge inspection, and nuclear facility monitoring — replacing rope access workers
      in hazardous environments.
    </p>
    <div class="app-detail">
      <strong>First demo:</strong> Stanford, Mark Cutkosky, 2005<br>
      <strong>Surface:</strong> Glass, acrylic — 90° vertical at 3 cm/s
    </div>
    <div class="app-links">
      <a class="btn btn-ghost" href="https://news.mit.edu/2009/stickybot-092509" target="_blank" style="font-size:.68rem">↗ MIT News</a>
    </div>
  </div>

  <div class="card reveal reveal-delay-2">
    <span class="tag tag-green">Medical</span>
    <h2 style="margin-top:.8rem">Gecko-Inspired Bandages</h2>
    <p style="flex:1">
      Harvard's 2008 PGSA elastomer bandage uses micro-pillar arrays to adhere to wet tissue
      without chemical irritation. Pain-free removal, breathable, biodegradable — surpassing every
      metric of traditional surgical adhesives. Now being extended to injectable internal tissue sealants.
    </p>
    <div class="app-detail">
      <strong>Origin:</strong> Harvard University, 2008<br>
      <strong>Material:</strong> PGSA (poly-glycerol-sebacate-acrylate) micropillar arrays
    </div>
    <div class="app-links">
      <a class="btn btn-ghost" href="https://www.nature.com/search?q=gecko+inspired+bandage" target="_blank" style="font-size:.68rem">↗ Nature Search</a>
    </div>
  </div>

  <div class="card reveal">
    <span class="tag tag-purple">Space</span>
    <h2 style="margin-top:.8rem">NASA Astrobee</h2>
    <p style="flex:1">
      Astrobee is a free-flying robotic system aboard the ISS, deployed 2019. It uses gecko-inspired
      adhesive pads to anchor itself to station surfaces and grip payloads in microgravity — where
      suction fails (no atmosphere) and magnets fail (non-ferrous surfaces). No mechanical clamps required.
    </p>
    <div class="app-detail">
      <strong>Location:</strong> ISS, Low Earth Orbit — deployed 2019<br>
      <strong>Why gecko?</strong> Only dry adhesive that works in vacuum across all surface types
    </div>
    <div class="app-links">
      <a class="btn btn-ghost" href="https://www.nasa.gov/astrobee/" target="_blank" style="font-size:.68rem">↗ NASA Astrobee</a>
    </div>
  </div>

  <div class="card reveal reveal-delay-1">
    <span class="tag tag-purple">Space</span>
    <h2 style="margin-top:.8rem">NASA Gecko Grippers</h2>
    <p style="flex:1">
      Dedicated gecko adhesive grippers tested aboard ISS (2021) for satellite servicing and
      debris capture. Unlike traditional robotic graspers, gecko grippers conform to any surface geometry —
      flat panels, curved hulls, solar arrays — without requiring precise alignment or contact force.
    </p>
    <div class="app-detail">
      <strong>Tested:</strong> ISS, 2021<br>
      <strong>Target use:</strong> Satellite servicing, orbital debris capture
    </div>
    <div class="app-links">
      <a class="btn btn-ghost" href="https://www.nasa.gov/missions/station/gecko-grippers-moving-on-up/" target="_blank" style="font-size:.68rem">↗ NASA Grippers</a>
    </div>
  </div>

  <div class="card reveal reveal-delay-2">
    <span class="tag tag-blue">Manufacturing</span>
    <h2 style="margin-top:.8rem">Precision Grippers</h2>
    <p style="flex:1">
      Gecko adhesive grippers for semiconductor handling — the only technology that can grip
      glass wafers, silicon dies, and optical components without clamping force, static charge,
      or surface contamination. Used in chip manufacturing cleanrooms where particle contamination
      is a critical concern.
    </p>
    <div class="app-detail">
      <strong>Industry:</strong> Semiconductor, optics, precision electronics<br>
      <strong>Advantage:</strong> Zero clamping force, zero contamination
    </div>
  </div>

</div>

<div class="section-rule reveal"><span>Comparative Data</span></div>

<div class="card reveal" style="overflow:auto">
  <table class="compare-table">
    <thead>
      <tr>
        <th>Technology</th><th>Adhesive Stress</th><th>Reusable?</th>
        <th>Works in Vacuum?</th><th>Residue?</th><th>First Use</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="hi">Gecko Tape</td><td class="hi">~100 kPa</td>
        <td>✓ 1,000+ cycles</td><td>✓ Yes</td><td>None</td><td>2003</td>
      </tr>
      <tr>
        <td>Normal Tape (PSA)</td><td>~30 kPa</td>
        <td>✗ Single use</td><td>⚠ Degrades</td><td>Yes</td><td>1930s</td>
      </tr>
      <tr>
        <td>Velcro</td><td>~60 kPa</td>
        <td>✓ Limited</td><td>✓ Yes</td><td>None</td><td>1955</td>
      </tr>
      <tr>
        <td>Super Glue (CA)</td><td>~1.5 MPa</td>
        <td>✗ Permanent</td><td>✓ Yes</td><td>Bond remains</td><td>1942</td>
      </tr>
      <tr>
        <td>Suction Cup</td><td>≤70 kPa</td>
        <td>✓ Yes</td><td>✗ No (no atm.)</td><td>None</td><td>Ancient</td>
      </tr>
    </tbody>
  </table>
</div>
`;
</script>
