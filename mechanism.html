<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mechanism — Gecko Lab</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .main-content { max-width:1300px }
    .mech-grid {
      display:grid;
      grid-template-columns:minmax(310px,390px) 1fr;
      gap:1.4rem;align-items:start;
    }
    .ctrl-group { margin-bottom:1rem }
    .ctrl-lbl {
      font-family:var(--fm);font-size:.72rem;letter-spacing:.07em;
      color:var(--t2);margin-bottom:.5rem;display:flex;justify-content:space-between;
    }
    .ctrl-lbl strong{color:var(--teal);font-family:var(--fm)}
    #vdwGraph { height:480px }
    .mech-notes ul {
      list-style:none;padding:0;
      display:flex;flex-direction:column;gap:.6rem;margin-top:.8rem;
    }
    .mech-notes li {
      display:flex;gap:.8rem;align-items:flex-start;
      font-size:.88rem;color:var(--t2);line-height:1.6;
    }
    .mech-notes li::before {
      content:'→';color:var(--teal);flex-shrink:0;
      font-family:var(--fm);font-size:.82rem;margin-top:.05rem;
    }
  </style>
</head>
<body>
<script src="js/layout.js"></script>
<script>
document.getElementById("main-content").style.maxWidth = "1300px";
document.getElementById("page-content").innerHTML = `
<div class="page-hero">
  <div class="ph-top">
    <span class="tag tag-teal">01 / Physics</span>
    <span class="tag tag-amber">Interactive</span>
  </div>
  <h1>Van der Waals <em>Force Explorer</em></h1>
  <p style="max-width:560px">
    Gecko adhesion is governed by a deceptively simple law: F ∝ 1/r⁶.
    Adjust the intermolecular distance and contact quality — watch how nanometer changes
    cascade into macroscale grip strength.
  </p>
</div>

<div class="mech-grid reveal">
  <div class="mech-panel">
    <div class="ctrl-head">Controls</div>

    <div class="ctrl-group">
      <div class="ctrl-lbl">
        Intermolecular distance r
        <strong><span id="distanceValue">0.60</span> nm</strong>
      </div>
      <input type="range" id="distanceSlider" min="0.30" max="2.00" step="0.01" value="0.60">
    </div>

    <div class="ctrl-group">
      <div class="ctrl-lbl">
        Micro-contact quality η
        <strong><span id="contactValue">75</span>%</strong>
      </div>
      <input type="range" id="contactSlider" min="10" max="100" step="1" value="75">
    </div>

    <div class="metric-grid">
      <div class="metric">
        <span class="mn">Relative Force (1/r⁶)</span>
        <span class="mv" id="forceValue">—</span>
      </div>
      <div class="metric">
        <span class="mn">Adhesion Index</span>
        <span class="mv" id="adhesionIndex">—</span>
      </div>
      <div class="metric">
        <span class="mn">Contact Spots</span>
        <span class="mv" id="contactSpots">—</span>
      </div>
      <div class="metric">
        <span class="mn">Regime</span>
        <span class="mv" id="modeLabel">—</span>
      </div>
    </div>

    <div class="equation">
      F<sub>vdW</sub> ∝ (1 / r<sup>6</sup>) × η<sub>contact</sub>
    </div>

    <span id="statusChip" class="status-chip">—</span>
  </div>

  <div class="mech-canvas-card">
    <div class="ctrl-head">Force Landscape</div>
    <canvas id="vdwGraph"></canvas>
  </div>
</div>

<div class="mech-notes card reveal" style="margin-top:1.4rem">
  <div class="ctrl-head">What this means in practice</div>
  <ul>
    <li><strong style="color:var(--t1)">Distance is everything:</strong> the force drops by 64× when distance doubles. A gecko pressed flat to glass engages more setae than one walking — more contact = more grip.</li>
    <li><strong style="color:var(--t1)">Surface conformity matters:</strong> rough or dirty surfaces reduce the fraction of setae that make true nanoscale contact, slashing the adhesion index.</li>
    <li><strong style="color:var(--t1)">Scalability:</strong> ~200M spatulae per foot — each contributing ~10 nN individually (Autumn 2002). Summed across ~500,000 setae: up to 20 N per foot, enough for the gecko to hold its own body weight many times over.</li>
    <li><strong style="color:var(--t1)">Directionality:</strong> setae are angled — they adhere in one direction and detach with a flick. Nature's toggle switch.</li>
  </ul>
</div>

<div class="section-rule reveal"><span>Label Glossary</span></div>

<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-bottom:3rem">

  <div class="card reveal" style="border-color:rgba(0,240,160,.15)">
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
      <span style="font-family:var(--fm);font-size:1.05rem;font-weight:700;color:var(--teal)">r</span>
      <div>
        <div style="font-family:var(--fm);font-size:.72rem;font-weight:700;color:var(--t1);letter-spacing:.04em">Intermolecular Distance</div>
        <div style="font-family:var(--fm);font-size:.62rem;color:var(--t3);letter-spacing:.06em">unit: nanometres (nm)</div>
      </div>
    </div>
    <p style="font-size:.86rem">The gap between a spatula molecule on the gecko's toe and a molecule on the surface it's touching. Van der Waals forces only operate at <strong style="color:var(--t1)">0.3–1.0 nm</strong> — about the width of a few atoms. Beyond ~2 nm, the force is essentially zero. This is why surface roughness destroys adhesion: bumps prevent molecules from getting close enough.</p>
  </div>

  <div class="card reveal reveal-delay-1" style="border-color:rgba(0,240,160,.15)">
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
      <span style="font-family:var(--fm);font-size:1.05rem;font-weight:700;color:var(--teal)">F ∝ 1/r⁶</span>
      <div>
        <div style="font-family:var(--fm);font-size:.72rem;font-weight:700;color:var(--t1);letter-spacing:.04em">Relative Force</div>
        <div style="font-family:var(--fm);font-size:.62rem;color:var(--t3);letter-spacing:.06em">dimensionless ratio</div>
      </div>
    </div>
    <p style="font-size:.86rem">The raw van der Waals attractive force between two molecules, expressed as a ratio relative to the force at r = 0.3 nm (the closest realistic contact). Calculated as <strong style="color:var(--t1)">(1/r)⁶</strong>. The sixth-power law means force changes extremely rapidly with distance — moving a molecule from 0.3 nm to 0.6 nm cuts the force by a factor of <strong style="color:var(--t1)">64×</strong>. This is the steepest distance-dependence of any common intermolecular force.</p>
  </div>

  <div class="card reveal reveal-delay-2" style="border-color:rgba(0,240,160,.15)">
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
      <span style="font-family:var(--fm);font-size:1.05rem;font-weight:700;color:var(--teal)">η</span>
      <div>
        <div style="font-family:var(--fm);font-size:.72rem;font-weight:700;color:var(--t1);letter-spacing:.04em">Micro-Contact Quality</div>
        <div style="font-family:var(--fm);font-size:.62rem;color:var(--t3);letter-spacing:.06em">unit: % (0–100)</div>
      </div>
    </div>
    <p style="font-size:.86rem">The percentage of spatulae on the toe pad that are actually making true nanoscale contact with the surface at any moment. On a perfectly smooth, clean surface η approaches 100%. On glass with a little dust, it might be 60–70%. On rough concrete, it could fall below 20%. Higher η means more active force contributors and stronger total grip. Real geckos achieve η ≈ 2–10% on natural surfaces (Autumn 2006, J. R. Soc. Interface) — the fraction is low because setae must be dragged into contact. Even so, this generates up to 20 N per foot, enough to support the gecko's full body weight with a large safety margin.</p>
  </div>

  <div class="card reveal" style="border-color:rgba(0,240,160,.15)">
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
      <span style="font-family:var(--fm);font-size:1.05rem;font-weight:700;color:var(--teal)">A<sub style="font-size:.7em">idx</sub></span>
      <div>
        <div style="font-family:var(--fm);font-size:.72rem;font-weight:700;color:var(--t1);letter-spacing:.04em">Normalized Adhesion Index</div>
        <div style="font-family:var(--fm);font-size:.62rem;color:var(--t3);letter-spacing:.06em">dimensionless, 0.000 – 1.000</div>
      </div>
    </div>
    <p style="font-size:.86rem">A single combined score that captures <em>both</em> the effect of distance and contact quality: <strong style="color:var(--t1)">A<sub>idx</sub> = (F/F<sub>max</sub>) × η</strong>. F<sub>max</sub> is the force at r = 0.3 nm. An index of 1.000 would mean perfect spacing and 100% contact — the theoretical maximum. A score above 0.55 is <span style="color:var(--green)">Strong</span>, 0.25–0.55 is <span style="color:var(--amber)">Moderate</span>, and below 0.25 is <span style="color:var(--red)">Weak</span> (likely to slip under load).</p>
  </div>

  <div class="card reveal reveal-delay-1" style="border-color:rgba(0,240,160,.15)">
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
      <span style="font-family:var(--fm);font-size:1.05rem;font-weight:700;color:var(--teal)">N<sub style="font-size:.7em">c</sub></span>
      <div>
        <div style="font-family:var(--fm);font-size:.72rem;font-weight:700;color:var(--t1);letter-spacing:.04em">Contact Spots Engaged</div>
        <div style="font-family:var(--fm);font-size:.62rem;color:var(--t3);letter-spacing:.06em">count (out of 30 modelled)</div>
      </div>
    </div>
    <p style="font-size:.86rem">How many of the 30 micro-contact dots in the visualization are currently active (shown as glowing teal vs dimmed). Each dot represents a cluster of spatulae making real contact. This is a simplified model — a real gecko foot has ~500,000 setae (Autumn et al. 2000), each branching into ~100–1,000 spatulae — giving roughly 50–500 million potential contact points per foot. The visualization scales this down to 30 for clarity, but the proportion matches η exactly.</p>
  </div>

  <div class="card reveal reveal-delay-2" style="border-color:rgba(0,240,160,.15)">
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
      <span style="font-family:var(--fm);font-size:1.05rem;font-weight:700;color:var(--teal)">Mode</span>
      <div>
        <div style="font-family:var(--fm);font-size:.72rem;font-weight:700;color:var(--t1);letter-spacing:.04em">Adhesion Regime</div>
        <div style="font-family:var(--fm);font-size:.62rem;color:var(--t3);letter-spacing:.06em">Strong / Moderate / Weak</div>
      </div>
    </div>
    <p style="font-size:.86rem">A qualitative summary of the current adhesion state based on the index threshold:
      <br><span style="color:var(--green);font-family:var(--fm);font-size:.78rem">● Strong</span> — index ≥ 0.55. Gecko can support significant load; setae are well-engaged.
      <br><span style="color:var(--amber);font-family:var(--fm);font-size:.78rem">● Moderate</span> — index 0.25–0.55. Marginal grip; load capacity is reduced but not zero.
      <br><span style="color:var(--red);font-family:var(--fm);font-size:.78rem">● Weak</span> — index &lt; 0.25. Near-zero effective adhesion; molecules are too far apart or too few contacts are active. Slip is likely under any real load.
    </p>
  </div>

</div>
`;

// Dynamically load vdw.js AFTER innerHTML is set (body.innerHTML wipe kills static script tags)
const s = document.createElement('script');
s.src = 'js/vdw.js';
document.body.appendChild(s);
</script>
</body>
</html>
