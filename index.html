<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gecko Lab — Biomimicry Research Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .main-content { max-width:1100px; padding-top:0 }

    /* ── Hero ── */
    .hero {
      min-height:calc(100vh - 58px);
      display:flex;flex-direction:column;justify-content:center;
      padding:4rem 0 3rem;position:relative;
    }
    .hero-canvas {
      position:fixed;top:58px;left:0;right:0;bottom:0;
      pointer-events:none;z-index:0;opacity:.6;
    }
    .hero-inner{position:relative;z-index:1}

    .eyebrow {
      display:flex;align-items:center;gap:1rem;margin-bottom:2rem;
    }
    .eyebrow-line{flex:1;max-width:60px;height:1px;background:var(--teal-mid)}
    .eyebrow-text {
      font-family:var(--fm);font-size:.65rem;letter-spacing:.18em;
      text-transform:uppercase;color:var(--teal);
    }

    .hero-title {
      font-family:var(--fd);
      font-size:clamp(3.5rem,9vw,7rem);
      font-weight:900;line-height:.92;letter-spacing:-.04em;
      color:var(--t1);margin-bottom:1.4rem;
      position:relative;
    }
    .hero-title .line-italic {
      display:block;font-style:italic;color:var(--teal);
      font-weight:300;font-size:.7em;letter-spacing:-.01em;
    }
    .hero-title .line-sub {
      display:block;font-weight:300;font-style:italic;
      font-size:.32em;color:var(--t3);letter-spacing:.02em;
      margin-top:.4rem;
    }

    .hero-desc {
      max-width:540px;font-size:1.05rem;color:var(--t2);
      line-height:1.7;margin-bottom:2.5rem;
    }

    .hero-stats {
      display:flex;gap:0;
      border:1px solid var(--border);border-radius:var(--r2);
      overflow:hidden;margin-bottom:3rem;
      width:fit-content;
    }
    .hero-stat {
      padding:1.2rem 1.8rem;border-right:1px solid var(--border);
      min-width:130px;
    }
    .hero-stat:last-child{border-right:none}
    .hero-stat .sv {
      font-family:var(--fm);font-size:1.35rem;font-weight:700;
      color:var(--teal);line-height:1;display:block;
    }
    .hero-stat .sl {
      font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;
      text-transform:uppercase;color:var(--t3);margin-top:.35rem;display:block;
    }

    .hero-cta { display:flex;gap:.8rem;flex-wrap:wrap;align-items:center }
    .cta-primary {
      display:inline-flex;align-items:center;gap:.6rem;
      font-family:var(--fm);font-size:.78rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;padding:.75rem 1.6rem;border-radius:var(--r1);
      background:var(--teal);color:var(--bg);text-decoration:none;
      transition:.25s var(--ease);box-shadow:0 0 24px rgba(0,240,160,.3);
    }
    .cta-primary:hover{box-shadow:0 0 40px rgba(0,240,160,.5);transform:translateY(-2px)}
    .cta-secondary {
      display:inline-flex;align-items:center;gap:.5rem;
      font-family:var(--fm);font-size:.76rem;letter-spacing:.07em;
      text-transform:uppercase;padding:.72rem 1.4rem;border-radius:var(--r1);
      border:1px solid var(--border-2);color:var(--t2);text-decoration:none;
      transition:.2s var(--ease);background:transparent;
    }
    .cta-secondary:hover{color:var(--teal);border-color:var(--teal);background:var(--teal-dim)}

    /* ── Intro callout ── */
    .intro-block {
      background:linear-gradient(135deg,rgba(0,240,160,.065),rgba(0,240,160,.015));
      border:1px solid var(--border-2);border-radius:var(--r3);
      padding:2.2rem 2.5rem;margin:3rem 0;
      display:grid;grid-template-columns:1fr 2fr;gap:2rem;align-items:center;
    }
    .intro-block .ib-stat {
      text-align:center;
      border-right:1px solid var(--border);padding-right:2rem;
    }
    .ib-big {
      font-family:var(--fm);font-size:2.8rem;font-weight:700;
      color:var(--teal);line-height:1;display:block;
    }
    .ib-sub {
      font-family:var(--fm);font-size:.62rem;letter-spacing:.12em;
      text-transform:uppercase;color:var(--t3);margin-top:.5rem;display:block;
    }
    .intro-block h2{color:var(--teal);font-size:1.1rem;margin-bottom:.6rem}

    /* ── Nav section ── */
    .explore-label {
      font-family:var(--fm);font-size:.64rem;letter-spacing:.18em;
      text-transform:uppercase;color:var(--t4);margin-bottom:1.2rem;
      display:flex;align-items:center;gap:.8rem;
    }
    .explore-label::after{content:'';flex:1;height:1px;background:var(--border)}

    @media(max-width:680px){
      .hero-stats{flex-wrap:wrap;width:100%}
      .hero-stat{border-right:none;border-bottom:1px solid var(--border);min-width:calc(50% - 0px)}
      .intro-block{grid-template-columns:1fr}
      .ib-stat{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:1.5rem;margin-bottom:.5rem}
    }
  </style>
</head>
<body>
<script src="js/layout.js"></script>
<script>

// Particle hero canvas

document.getElementById("page-content").innerHTML = `
${heroCanvasHTML}

<div class="hero">

      </div>
      <div class="hero-stat">
        <span class="sv">0.3–0.6<span style="font-size:.7em;font-weight:400"> nm</span></span>

      </div>
      <div class="hero-stat">
        <span class="sv">136 kg</span>

    <div class="hero-cta reveal reveal-delay-3">
      <a class="cta-primary" href="setae.html">↓ Explore the Setae Model</a>

</div>

<div class="intro-block reveal">
  <div class="ib-stat">
    <span class="ib-big">×27</span>
    <span class="ib-sub">Stronger than 3M tape<br>per unit area</span>
  </div>
  <div>
    <h2>What is Gecko Biomimicry?</h2>
    <p>

</div>

<div class="nav-grid">

  <a class="nav-card reveal reveal-delay-2" href="future.html">

// ── Hero particle canvas ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById("heroCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  let W, H, dpr, particles = [], connections = [];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    init();
  }

  function init() {
    const n = Math.floor((W * H) / 22000);
    particles = Array.from({ length: n }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25,
      r: .8 + Math.random() * 1.8,
      a: .1 + Math.random() * .5,
      type: "teal",
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const p = particles[i], q = particles[j];
        const dx = p.x - q.x, dy = p.y - q.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 140) {
          const alpha = (1 - dist/140) * .12;
          ctx.strokeStyle = `rgba(0,240,160,${alpha})`;
          ctx.lineWidth = .5;
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
        }
      }
    }

    // Draw particles
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      const color = `rgba(0,240,160,${p.a})`;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", resize);
  resize();
  draw();
})();
</script>
</body>
</html>
